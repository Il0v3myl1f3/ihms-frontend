<div class="custom-select-wrapper relative">
    <!-- Trigger Button -->
    <button type="button"
        (click)="toggle($event)"
        class="select-trigger"
        [class.is-open]="isOpen()"
        [class.has-value]="!!selectedValue()"
        [class.is-disabled]="isDisabled()">
        <span [class.placeholder]="!selectedValue()">
            {{ selectedLabel() || placeholder() }}
        </span>
        <lucide-icon [img]="ChevronDown"
            class="chevron-icon"
            [class.rotate-180]="isOpen()">
        </lucide-icon>
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
    <div class="select-dropdown slim-scroll"
        [style.position]="'fixed'"
        [style.top.px]="dropdownPos.top"
        [style.left.px]="dropdownPos.left"
        [style.width.px]="dropdownPos.width">
        @for (option of options(); track option.value) {
        <button type="button"
            (click)="selectOption(option, $event)"
            class="select-option"
            [class.is-selected]="option.value === selectedValue()"
            [class.is-disabled]="option.disabled">
            {{ option.label }}
        </button>
        }
    </div>
    }
</div>
