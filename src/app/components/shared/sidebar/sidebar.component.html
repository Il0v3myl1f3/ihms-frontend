<aside
    class="sidebar fixed left-0 top-0 bottom-0 z-40 flex flex-col bg-white border-r border-gray-100 transition-all duration-300 ease-in-out"
    [class.sidebar--collapsed]="collapsed()">
    <!-- Brand + Toggle -->
    <div class="flex items-center justify-between px-5 py-6 border-b border-gray-100">
        <a routerLink="/"
            class="text-display-2 tracking-wider uppercase cursor-pointer overflow-hidden whitespace-nowrap transition-all duration-300"
            [class.opacity-0]="collapsed()" [class.w-0]="collapsed()">
            <span class="text-[#1F2B6C]">Med</span><span class="text-[#159EEC]">ical</span>
        </a>

        <!-- Collapse toggle -->
        <button (click)="toggleCollapse()"
            class="flex items-center justify-center w-8 h-8 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors cursor-pointer shrink-0"
            aria-label="Toggle sidebar">
            <lucide-icon [img]="ChevronLeft" class="w-4 h-4 text-gray-500 transition-transform duration-300"
                [class.rotate-180]="collapsed()"></lucide-icon>
        </button>
    </div>

    <!-- Menu Sections -->
    <nav class="flex-1 overflow-y-auto overflow-x-hidden py-4 px-3">
        @for (section of menuSections; track section.title) {
            <div class="mb-6">
                <!-- Section Title -->
                <p class="px-3 mb-2 text-xs font-semibold uppercase tracking-wider text-gray-400 transition-all duration-300 whitespace-nowrap"
                    [class.opacity-0]="collapsed()" [class.text-center]="collapsed()">
                    {{ section.title }}
                </p>

                <!-- Section Items -->
                <ul class="space-y-1">
                    @for (item of section.items; track item.route) {
                        <li>
                            <a [routerLink]="item.route" routerLinkActive="sidebar-item--active"
                                #rla="routerLinkActive"
                                [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
                                class="sidebar-item flex items-center w-full rounded-lg transition-all duration-200 cursor-pointer"
                                [class.justify-center]="collapsed()" [class.px-3]="!collapsed()" [class.py-2.5]="true"
                                [title]="collapsed() ? item.label : ''">
                                <lucide-icon [img]="item.icon"
                                    [class.text-white]="rla.isActive"
                                    [class.text-gray-500]="!rla.isActive"
                                    class="w-5 h-5 shrink-0 transition-colors duration-200"></lucide-icon>
                                <span
                                    class="ml-3 text-sm font-medium whitespace-nowrap transition-all duration-300 text-gray-700"
                                    [class.hidden]="collapsed()">
                                    {{ item.label }}
                                </span>
                            </a>
                        </li>
                    }
                </ul>
            </div>
        }
    </nav>

    <!-- Bottom Section -->
    <div class="border-t border-gray-100 px-3 py-4 space-y-1">
        <!-- Help Center -->
        <button class="sidebar-item flex items-center w-full rounded-lg transition-all duration-200 cursor-pointer"
            [class.justify-center]="collapsed()" [class.px-3]="!collapsed()" [class.py-2.5]="true"
            [title]="collapsed() ? 'Help Center' : ''">
            <lucide-icon [img]="HelpCircle" class="w-5 h-5 text-gray-500 shrink-0"></lucide-icon>
            <span class="ml-3 text-sm font-medium text-gray-700 whitespace-nowrap transition-all duration-300"
                [class.hidden]="collapsed()">
                Help Center
            </span>
        </button>

        <!-- Logout -->
        <button (click)="logout()"
            class="sidebar-item flex items-center w-full rounded-lg transition-all duration-200 cursor-pointer group"
            [class.justify-center]="collapsed()" [class.px-3]="!collapsed()" [class.py-2.5]="true"
            [title]="collapsed() ? 'Logout' : ''">
            <lucide-icon [img]="LogOut" class="w-5 h-5 text-red-500 shrink-0"></lucide-icon>
            <span class="ml-3 text-sm font-medium text-red-500 whitespace-nowrap transition-all duration-300"
                [class.hidden]="collapsed()">
                Logout
            </span>
        </button>
    </div>
</aside>
