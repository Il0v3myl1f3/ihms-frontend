<!-- Backdrop -->
<div *ngIf="isOpen"
    class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/40 transition-opacity"
    (click)="onBackdropClick($event)">

    <!-- Modal Card -->
    <div
        class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 transform transition-all flex flex-col max-h-[90vh]">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between shrink-0">
            <h3 class="text-xl font-bold text-[#1F2B6C] tracking-tight">{{ title }}</h3>
            <button (click)="onClose()"
                class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-md hover:bg-gray-100">
                <lucide-icon [img]="X" class="w-5 h-5"></lucide-icon>
            </button>
        </div>

        <!-- Body (Scrollable) -->
        <div class="px-6 py-6 overflow-y-auto grow">
            <ng-content select="[modal-body]"></ng-content>
        </div>

        <!-- Footer -->
        <div
            class="px-6 py-4 border-t border-gray-100 flex items-center justify-end gap-3 shrink-0 bg-gray-50/50 rounded-b-2xl">
            <ng-content select="[modal-footer]"></ng-content>
        </div>

    </div>
</div>
