<div class="relative w-full block">
    <!-- Trigger Button -->
    <button type="button"
        (click)="toggle($event)"
        [disabled]="isDisabled()"
        class="flex items-center justify-between w-full px-3 py-2.5 border border-gray-200 rounded-xl bg-gray-50/50 text-sm text-gray-800 cursor-pointer transition-all duration-200 outline-none text-left min-h-[42px] focus:ring-2 focus:ring-[#159EEC]/20 focus:border-[#159EEC] hover:border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed"
        [class.border-[#159EEC]]="isOpen()"
        [class.bg-white]="isOpen()"
        [class.shadow-sm]="isOpen()">
        
        <div class="flex items-center gap-2.5">
            <lucide-icon [img]="Clock" class="w-4 h-4 text-gray-400 transition-colors duration-200" [class.text-[#159EEC]]="isOpen()"></lucide-icon>
            <span [class.text-gray-400]="!selectedValue()" class="font-medium">
                {{ selectedValue() || placeholder() }}
            </span>
        </div>
        
        <lucide-icon [img]="ChevronDown" class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200" [class.rotate-180]="isOpen()"></lucide-icon>
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
    <div class="z-[99999] bg-white border border-gray-100 rounded-2xl shadow-[0_4px_24px_rgba(31,43,108,0.12)] p-2 w-[200px] flex overflow-hidden origin-top animate-item-in"
        [style.position]="'fixed'"
        [style.top.px]="dropdownPos.top"
        [style.left.px]="dropdownPos.left">
        
        <!-- Hours Column -->
        <div class="flex-1 flex flex-col max-h-[280px] overflow-y-auto custom-scrollbar border-r border-gray-50">
            <div class="px-2 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center sticky top-0 bg-white pb-2">Hour</div>
            @for (h of hours; track h) {
                <button type="button"
                    (click)="selectHour(h, $event)"
                    class="h-9 min-h-[36px] w-full flex items-center justify-center rounded-lg text-[13px] transition-all duration-200 font-medium mb-0.5 last:mb-0"
                    [class.bg-[#159EEC]]="selectedHour() === h"
                    [class.text-white]="selectedHour() === h"
                    [class.font-bold]="selectedHour() === h"
                    [class.hover:bg-[#159EEC]/10]="selectedHour() !== h"
                    [class.hover:text-[#159EEC]]="selectedHour() !== h">
                    {{ h }}
                </button>
            }
        </div>

        <!-- Minutes Column -->
        <div class="flex-1 flex flex-col max-h-[280px] overflow-y-auto custom-scrollbar">
            <div class="px-2 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center sticky top-0 bg-white pb-2">Min</div>
            @for (m of minutes; track m) {
                <button type="button"
                    (click)="selectMinute(m, $event)"
                    class="h-9 min-h-[36px] w-full flex items-center justify-center rounded-lg text-[13px] transition-all duration-200 font-medium mb-0.5 last:mb-0"
                    [class.bg-[#159EEC]]="selectedMinute() === m"
                    [class.text-white]="selectedMinute() === m"
                    [class.font-bold]="selectedMinute() === m"
                    [class.hover:bg-[#159EEC]/10]="selectedMinute() !== m"
                    [class.hover:text-[#159EEC]]="selectedMinute() !== m">
                    {{ m }}
                </button>
            }
        </div>
    </div>
    }
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #E2E8F0;
        border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #CBD5E1;
    }
    
    .animate-item-in {
        animation: slideIn 0.2s ease-out;
    }
    
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
</style>
