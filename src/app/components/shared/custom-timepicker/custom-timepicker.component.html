<div class="relative w-full block">
    <!-- Trigger Button -->
    <button type="button"
        (click)="toggle($event)"
        [disabled]="isDisabled()"
        class="flex items-center justify-between w-full px-3 py-2 border border-gray-200 rounded-lg bg-white text-sm text-gray-800 cursor-pointer transition-all duration-200 outline-none text-left min-h-[38px] focus:border-[#1F2B6C] focus:ring-1 focus:ring-[#1F2B6C] hover:border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-gray-50 disabled:hover:border-gray-200"
        [class.border-[#1F2B6C]]="isOpen()"
        [class.ring-1]="isOpen()"
        [class.ring-[#1F2B6C]]="isOpen()">
        
        <div class="flex items-center gap-2.5">
            <lucide-icon [img]="Clock" class="w-4 h-4 text-gray-400 transition-colors duration-200" [class.text-[#1F2B6C]]="isOpen()"></lucide-icon>
            <span [class.text-gray-400]="!selectedValue()" class="font-medium">
                {{ selectedValue() || placeholder() }}
            </span>
        </div>
        
        <lucide-icon [img]="ChevronDown" class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200" [class.rotate-180]="isOpen()"></lucide-icon>
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
    <div class="z-[99999] bg-white border border-gray-300 rounded-lg shadow-[0_4px_24px_rgba(0,0,0,0.1)] p-2 w-[200px] flex overflow-hidden origin-top"
        [style.position]="'fixed'"
        [style.top.px]="dropdownPos.top"
        [style.left.px]="dropdownPos.left">
        
        <!-- Hours Column -->
        <div #hoursCol class="flex-1 flex flex-col max-h-[240px] overflow-y-auto slim-scroll border-r border-gray-100">
            <div class="px-2 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center sticky top-0 bg-white pb-2">Hour</div>
            @for (h of hours; track h) {
                <button type="button"
                    (click)="selectHour(h, $event)"
                    class="h-9 min-h-[36px] w-full flex items-center justify-center rounded-lg text-[13px] transition-all duration-200 font-medium mb-0.5 last:mb-0"
                    [class.bg-[#1F2B6C]]="selectedHour() === h"
                    [class.text-white]="selectedHour() === h"
                    [class.font-bold]="selectedHour() === h"
                    [class.hover:bg-gray-100]="selectedHour() !== h"
                    [class.hover:text-[#1F2B6C]]="selectedHour() !== h">
                    {{ h }}
                </button>
            }
        </div>

        <!-- Minutes Column -->
        <div #minutesCol class="flex-1 flex flex-col max-h-[240px] overflow-y-auto slim-scroll">
            <div class="px-2 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center sticky top-0 bg-white pb-2">Min</div>
            @for (m of minutes; track m) {
                <button type="button"
                    (click)="selectMinute(m, $event)"
                    class="h-9 min-h-[36px] w-full flex items-center justify-center rounded-lg text-[13px] transition-all duration-200 font-medium mb-0.5 last:mb-0"
                    [class.bg-[#1F2B6C]]="selectedMinute() === m"
                    [class.text-white]="selectedMinute() === m"
                    [class.font-bold]="selectedMinute() === m"
                    [class.hover:bg-gray-100]="selectedMinute() !== m"
                    [class.hover:text-[#1F2B6C]]="selectedMinute() !== m">
                    {{ m }}
                </button>
            }
        </div>
    </div>
    }
</div>
