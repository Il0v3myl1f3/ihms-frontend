<div class="relative w-full block">
    <!-- Trigger Button -->
    <button type="button"
        (click)="toggle($event)"
        [disabled]="isDisabled()"
        class="flex items-center justify-between w-full px-3 py-2 border border-gray-200 rounded-lg bg-white text-sm text-gray-800 cursor-pointer transition-all duration-200 outline-none text-left min-h-[38px] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 hover:border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-gray-50 disabled:hover:border-gray-200"
        [class.border-blue-500]="isOpen()"
        [class.ring-1]="isOpen()"
        [class.ring-blue-500]="isOpen()">
        <span [class.text-gray-400]="!selectedValue()">
            {{ selectedLabel() || placeholder() }}
        </span>
        <lucide-icon [img]="CalendarDays" class="w-4 h-4 text-gray-500 shrink-0 transition-colors duration-200" [class.text-blue-500]="isOpen()"></lucide-icon>
    </button>

    <!-- Dropdown -->
    @if (isOpen()) {
    <div class="z-[99999] bg-white border border-gray-300 rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.08)] p-4 w-[280px] origin-top"
        [style.position]="'fixed'"
        [style.top.px]="dropdownPos.top"
        [style.left.px]="dropdownPos.left">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <button type="button" (click)="prevMonth($event)" class="p-1.5 rounded-xl hover:bg-gray-100 hover:text-[#1F2B6C] transition-colors text-gray-500">
                <lucide-icon [img]="ChevronLeft" class="w-5 h-5"></lucide-icon>
            </button>
            <button type="button" 
                (click)="toggleViewMode($event)"
                class="px-3 py-1 rounded-lg hover:bg-gray-100 transition-colors group">
                <span class="text-[15px] font-extrabold text-[#1F2B6C] tracking-wide group-hover:text-[#1F2B6C]">{{ currentMonthName() }}</span>
            </button>
            <button type="button" (click)="nextMonth($event)" class="p-1.5 rounded-xl hover:bg-gray-100 hover:text-[#1F2B6C] transition-colors text-gray-500">
                <lucide-icon [img]="ChevronRight" class="w-5 h-5"></lucide-icon>
            </button>
        </div>

        @if (viewMode() === 'days') {
            <!-- Days of week -->
            <div class="grid grid-cols-7 gap-1 mb-2">
                @for (day of ['Mo','Tu','We','Th','Fr','Sa','Su']; track day) {
                    <div class="text-center text-[11px] font-bold text-gray-400 tracking-wider uppercase">{{ day }}</div>
                }
            </div>

            <!-- Calendar Grid -->
            <div class="grid grid-cols-7 gap-1">
                @for (day of days(); track day.dateString) {
                    <button type="button"
                        (click)="selectDate(day, $event)"
                        class="h-8 w-full flex items-center justify-center rounded-xl text-[13px] transition-all duration-200 font-medium active:scale-90"
                        [class.text-gray-300]="!day.isCurrentMonth"
                        [class.text-gray-700]="day.isCurrentMonth && day.dateString !== selectedValue()"
                        [class.bg-[#1F2B6C]]="day.dateString === selectedValue()"
                        [class.text-white]="day.dateString === selectedValue()"
                        [class.font-bold]="day.dateString === selectedValue()"
                        [class.border-2]="day.dateString === todayIso && day.dateString !== selectedValue()"
                        [class.border-[#1F2B6C]/30]="day.dateString === todayIso && day.dateString !== selectedValue()"
                        [class.hover:bg-gray-100]="day.dateString !== selectedValue() && day.isCurrentMonth"
                        [class.hover:text-[#1F2B6C]]="day.dateString !== selectedValue() && day.isCurrentMonth"
                        [class.hover:bg-gray-50]="day.dateString !== selectedValue() && !day.isCurrentMonth">
                        {{ day.num }}
                    </button>
                }
            </div>
        } @else {
            <!-- Month & Year Selection -->
            <div class="flex gap-4 h-[240px]">
                <!-- Months Column -->
                <div #monthsCol class="flex-1 overflow-y-auto pr-1 slim-scroll">
                    <div class="flex flex-col gap-1">
                        @for (month of months; track month; let i = $index) {
                            <button type="button"
                                (click)="selectMonth(i, $event)"
                                class="px-3 py-2 rounded-lg text-sm text-left transition-all"
                                [class.bg-blue-50]="displayDate().getMonth() === i"
                                [class.text-[#1F2B6C]]="displayDate().getMonth() === i"
                                [class.font-bold]="displayDate().getMonth() === i"
                                [class.hover:bg-gray-100]="displayDate().getMonth() !== i">
                                {{ month }}
                            </button>
                        }
                    </div>
                </div>

                <!-- Years Column -->
                <div #yearsCol class="flex-1 overflow-y-auto pr-1 slim-scroll">
                    <div class="flex flex-col gap-1">
                        @for (year of years(); track year) {
                            <button type="button"
                                (click)="selectYear(year, $event)"
                                class="px-3 py-2 rounded-lg text-sm text-left transition-all"
                                [class.bg-blue-50]="displayDate().getFullYear() === year"
                                [class.text-[#1F2B6C]]="displayDate().getFullYear() === year"
                                [class.font-bold]="displayDate().getFullYear() === year"
                                [class.hover:bg-gray-100]="displayDate().getFullYear() !== year">
                                {{ year }}
                            </button>
                        }
                    </div>
                </div>
            </div>

            <!-- Action Button Removed per User Request -->
        }
    </div>
    }
</div>
