<app-modal [isOpen]="isOpen()" title="{{ inpatientToEdit() ? 'Edit Inpatient' : 'Admit New Patient' }}" (close)="onCancel()">

    <form [formGroup]="inpatientForm" modal-body>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">

            <!-- Patient Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Patient Name *</label>
                <input type="text" formControlName="patientName" placeholder="e.g. Jane Robertson"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Room Number -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Room Number *</label>
                <input type="text" formControlName="roomNumber" placeholder="e.g. A-101"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Doctor Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Assigned Doctor *</label>
                <input type="text" formControlName="doctorName" placeholder="e.g. Dr. Mia Kensington"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Admission Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Admission Date *</label>
                <input type="date" formControlName="admissionDate"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Discharge Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Discharge Date</label>
                <input type="date" formControlName="dischargeDate"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Status -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Status *</label>
                <div class="relative">
                    <select formControlName="status"
                        class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors appearance-none bg-white">
                        <option value="" disabled selected>Select</option>
                        <option value="Admitted">Admitted</option>
                        <option value="Discharged">Discharged</option>
                        <option value="Transferred">Transferred</option>
                        <option value="Critical">Critical</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Diagnosis (full width) -->
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Diagnosis *</label>
                <input type="text" formControlName="diagnosis" placeholder="e.g. Pneumonia, Post-surgery recovery"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

        </div>
    </form>

    <div modal-footer class="w-full flex items-center justify-end gap-3">
        <button type="button" (click)="onCancel()"
            class="px-5 py-2.5 bg-white border border-gray-200 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            Cancel
        </button>
        <button type="button" (click)="onSubmit()" [disabled]="inpatientForm.invalid"
            class="px-5 py-2.5 bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-md text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
            {{ inpatientToEdit() ? 'Save Changes' : 'Admit Patient' }}
        </button>
    </div>
</app-modal>
