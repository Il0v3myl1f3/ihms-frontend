<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-dashboard-title text-[#1F2B6C] tracking-tight mb-1">Inpatients</h2>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-[20px] border border-gray-100 flex-1 flex flex-col relative">
        <app-inpatient-table class="flex-1 flex flex-col h-full" [inpatients]="inpatients"
            (editInpatient)="onEditInpatient($event)" (deleteInpatient)="onDeleteInpatient($event)"
            (deleteSelected)="onDeleteSelectedInpatients($event)"
            (addInpatient)="openAddInpatientModal()"></app-inpatient-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isAddInpatientModalOpen) {
<app-inpatient-create-modal [isOpen]="isAddInpatientModalOpen" [inpatientToEdit]="selectedInpatientForEdit"
    (closeModal)="closeAddInpatientModal()" (saveInpatient)="onInpatientSaved($event)">
</app-inpatient-create-modal>
}
