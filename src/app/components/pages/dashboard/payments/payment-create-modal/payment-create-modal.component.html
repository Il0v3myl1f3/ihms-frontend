<app-modal [isOpen]="isOpen()" 
    title="{{ readOnly() ? 'View Payment' : (paymentToEdit() ? 'Edit Payment' : 'Add New Payment') }}" 
    (close)="onCancel()">

    <form [formGroup]="paymentForm" modal-body>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            <!-- Invoice Number -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Invoice Number *</label>
                <input type="text" formControlName="invoiceNumber" placeholder="e.g. INV-2024-001"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Patient Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Patient Name *</label>
                <input type="text" formControlName="patientName" placeholder="Patient full name"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Amount ($) *</label>
                <input type="number" formControlName="amount" placeholder="e.g. 350.00" step="0.01"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
            </div>

            <!-- Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Date *</label>
                <input type="date" formControlName="date"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
                    @if (readOnly() && paymentToEdit()) {
                        <p class="text-[12px] text-gray-500 mt-1 pl-1 font-medium italic">Current: {{ paymentToEdit()!.date }}</p>
                    }
            </div>

            <!-- Payment Method -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Payment Method *</label>
                <app-custom-select formControlName="method" placeholder="Select"
                    [options]="methodOptions">
                </app-custom-select>
            </div>

            <!-- Status -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Status *</label>
                <app-custom-select formControlName="status" placeholder="Select"
                    [options]="statusOptions">
                </app-custom-select>
            </div>
        </div>
    </form>

    <div modal-footer class="w-full flex items-center justify-end gap-3">
        @if (readOnly()) {
            <button type="button" (click)="onCancel()"
                class="px-8 py-2.5 bg-[#1F2B6C] text-white rounded-lg text-sm font-medium hover:bg-[#151D4A] transition-colors shadow-sm">
                Close
            </button>
        } @else {
            <button type="button" (click)="onCancel()"
                class="px-5 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Cancel
            </button>
            <button type="button" (click)="onSubmit()" [disabled]="paymentForm.invalid"
                class="px-5 py-2.5 bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                {{ paymentToEdit() ? 'Save Changes' : 'Add Payment' }}
            </button>
        }
    </div>
</app-modal>
