<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-dashboard-title text-[#1F2B6C] tracking-tight mb-1">List Patients</h2>
            <p class="text-sm text-gray-500">There is the latest update for the last 7 days, check now.</p>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-[20px] border border-gray-100 flex-1 flex flex-col relative shadow-sm">
        <app-patient-table class="flex-1 flex flex-col h-full" [patients]="patients"
            (editPatient)="onEditPatient($event)" (deletePatient)="onDeletePatient($event)"
            (deleteSelected)="onDeleteSelectedPatients($event)"
            (addPatient)="openAddPatientModal()"></app-patient-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isAddPatientModalOpen) {
<app-patient-create-modal [isOpen]="isAddPatientModalOpen" [patientToEdit]="selectedPatientForEdit"
    (closeModal)="closeAddPatientModal()" (savePatient)="onPatientSaved($event)">
</app-patient-create-modal>
}
