<div class="h-full flex flex-col max-w-[1200px] mx-auto w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-900 mb-1">List Patients</h2>
            <p class="text-sm text-gray-400">There is the latest update for the last 7 days, check now.</p>
        </div>
        <div class="flex items-center gap-3">
            <button type="button" (click)="openAddPatientModal()"
                class="px-5 py-2.5 bg-[#2962ff] text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                Add Patient
            </button>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden relative">
        <app-patient-table class="flex-1 flex flex-col" [patients]="patients" (editPatient)="onEditPatient($event)"
            (deletePatient)="onDeletePatient($event)"
            (deleteSelected)="onDeleteSelectedPatients($event)"></app-patient-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isAddPatientModalOpen) {
    <app-patient-create-modal [isOpen]="isAddPatientModalOpen"
        [patientToEdit]="selectedPatientForEdit" (closeModal)="closeAddPatientModal()"
        (savePatient)="onPatientSaved($event)">
    </app-patient-create-modal>
}
