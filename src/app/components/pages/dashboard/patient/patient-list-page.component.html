<div class="h-full flex flex-col max-w-[1200px] mx-auto w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <div>
            <h2 class="text-3xl font-bold text-gray-900 mb-1">List Patients</h2>
            <p class="text-sm text-gray-400">There is the latest update for the last 7 days, check now.</p>
        </div>
        <div class="flex items-center gap-3">
            <button type="button" (click)="openAddPatientModal()"
                class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Add Patient
            </button>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden relative">
        <app-patient-table class="flex-1 flex flex-col" [patients]="patients"></app-patient-table>
    </div>
</div>

<!-- Modal Overlay -->
<app-patient-create-modal *ngIf="isAddPatientModalOpen" [isOpen]="isAddPatientModalOpen"
    (closeModal)="closeAddPatientModal()" (savePatient)="onPatientSaved($event)">
</app-patient-create-modal>
