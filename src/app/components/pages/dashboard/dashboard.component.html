<div class="dashboard-layout min-h-screen bg-linear-to-br">
  <!-- Backdrop for Mobile Sidebar -->
  @if (isMobileSidebarOpen()) {
  <div (click)="isMobileSidebarOpen.set(false)"
    class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 lg:hidden transition-opacity duration-300"></div>
  }

  <!-- Sidebar -->
  <app-sidebar [collapsed]="isMobileSidebarOpen() ? false : isSidebarCollapsed()" [mobileOpen]="isMobileSidebarOpen()"
    (onToggle)="toggleSidebar()" (onMenuClick)="isMobileSidebarOpen.set(false)"></app-sidebar>

  <!-- Main Content Area -->
  <main class="dashboard-main transition-all duration-300 min-h-screen flex flex-col relative ml-0"
    [class.lg:ml-[250px]]="!isSidebarCollapsed()" [class.lg:ml-[72px]]="isSidebarCollapsed()">
    <!-- Top Header Bar (Absolute to overlay on the content) -->
    <header
      class="absolute top-0 w-full flex items-start justify-between px-4 sm:px-8 py-8 shrink-0 z-40 pointer-events-none transition-all duration-300">
      <!-- Mobile Menu Toggle -->
      <button (click)="toggleMobileSidebar()"
        class="lg:hidden p-2 text-gray-400 hover:text-[#1F2B6C] bg-white border border-gray-100 rounded-xl transition-all active:scale-95 pointer-events-auto shadow-sm">
        <lucide-icon [img]="Menu" class="w-5 h-5"></lucide-icon>
      </button>

      <div class="hidden lg:block"></div>

      <!-- Right Side Tools -->
      <div class="flex items-center gap-4 pointer-events-auto sm:mt-[-0.25rem]">
        <!-- Settings -->
        <button [routerLink]="['/dashboard/settings']"
          class="hidden md:block p-2.5 text-gray-500 hover:text-[#1F2B6C] bg-white rounded-full hover:bg-gray-50 transition-colors cursor-pointer border border-gray-200">
          <lucide-icon [img]="Settings" class="w-5 h-5"></lucide-icon>
        </button>


        <!-- User Profile -->
        <div
          class="hidden sm:flex items-center gap-3 cursor-pointer group bg-white px-3 py-1.5 rounded-full border border-gray-200 hover:bg-gray-50 transition-colors">
          <img
            src="https://ui-avatars.com/api/?name={{ displayName() | avatarInitials }}&background=EAF6FD&color=1F2B6C&rounded=true"
            alt="User avatar" class="w-9 h-9 rounded-full object-cover">
          <div class="hidden md:flex flex-col items-start gap-0.5 pr-1">
            <span
              class="text-sm font-bold text-[#1F2B6C] group-hover:text-[#159EEC] transition-colors leading-tight">
              {{ displayName() }}
            </span>
            <span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">
              {{ currentUser?.role || 'Guest' }}
            </span>
          </div>
        </div>
      </div>
    </header>

    <!-- Rest of the Content (Router Outlet) -->
    <div class="p-4 sm:p-8 pt-8 flex-1 relative bg-[#FDFDFD] min-h-screen">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
