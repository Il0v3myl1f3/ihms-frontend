<div class="dashboard-layout min-h-screen bg-linear-to-br">
  <!-- Sidebar -->
  <app-sidebar [collapsed]="isSidebarCollapsed()" (onToggle)="toggleSidebar()"></app-sidebar>

  <!-- Main Content Area -->
  <main class="dashboard-main transition-all duration-300 min-h-screen flex flex-col"
    [class.ml-[250px]]="!isSidebarCollapsed()" [class.ml-[72px]]="isSidebarCollapsed()">
    <!-- Top Header Bar -->
    <header class="bg-gray-50/50 flex items-center justify-between px-8 py-3 w-full shrink-0 h-24">

      <!-- Page Title Spacer -->
      <div></div>

      <!-- Right Side Tools -->
      <div class="flex items-center gap-4">
        <!-- Settings -->
        <button routerLink="/dashboard/settings"
          class="relative p-2.5 text-gray-500 hover:text-[#1F2B6C] bg-white rounded-full hover:bg-gray-50 transition-colors cursor-pointer shadow-sm">
          <lucide-icon [img]="Settings" class="w-5 h-5"></lucide-icon>
        </button>

        <!-- Notification Bell -->
        <button
          class="relative p-2.5 text-gray-500 hover:text-[#1F2B6C] bg-white rounded-full hover:bg-gray-50 transition-colors cursor-pointer shadow-sm">
          <lucide-icon [img]="Bell" class="w-5 h-5"></lucide-icon>
          <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Divider -->
        <div class="h-8 w-px bg-gray-200 mx-2"></div>

        <!-- User Profile -->
        <div
          class="flex items-center gap-3 cursor-pointer group bg-white px-3 py-1.5 rounded-full shadow-sm hover:shadow-md transition-shadow">
          <img
            src="https://ui-avatars.com/api/?name={{ currentUser?.name || 'User' }}&background=EAF6FD&color=1F2B6C&rounded=true"
            alt="User avatar" class="w-9 h-9 rounded-full object-cover">
          <div class="hidden md:flex items-center gap-2 pr-1">
            <span
              class="text-sm font-semibold text-[#1F2B6C] group-hover:text-[#159EEC] transition-colors leading-tight">
              {{ currentUser?.name || 'Alfredo Westervelt' }}
            </span>
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>
      </div>
    </header>

    <!-- Rest of the Content (Router Outlet) -->
    <div class="p-8 pt-0 lg:p-8 lg:pt-0 flex-1 relative bg-gray-50/50">
      <router-outlet></router-outlet>

      <!-- Footer -->
      <footer
        class="mt-8 pt-4 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between text-xs text-gray-500 pb-2">
        <div class="flex items-center gap-4">
          <span class="font-medium">Copyright &copy; 2024 Peterdraw</span>
          <a href="#" class="hover:text-gray-700">Privacy Policy</a>
          <a href="#" class="hover:text-gray-700">Term and conditions</a>
          <a href="#" class="hover:text-gray-700">Contact</a>
        </div>
      </footer>
    </div>
  </main>
</div>
