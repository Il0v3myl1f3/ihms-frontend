<app-modal [isOpen]="isOpen" title="Add New Doctor" (close)="onCancel()">

    <form [formGroup]="doctorForm" modal-body class="grid grid-cols-2 gap-x-6 gap-y-5">

        <!-- Name Field -->
        <div class="space-y-1.5">
            <label class="text-xs font-semibold text-gray-500 block">Name</label>
            <input type="text" formControlName="name" placeholder="E.g. Dr. John Doe"
                class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-[#159EEC] focus:border-[#159EEC] transition-all"
                [ngClass]="{'border-red-300 focus:ring-red-400 focus:border-red-400': doctorForm.get('name')?.invalid && doctorForm.get('name')?.touched}">
            <span *ngIf="doctorForm.get('name')?.invalid && doctorForm.get('name')?.touched"
                class="text-[10px] text-red-500 font-medium">Name is required.</span>
        </div>

        <!-- Specialization Field -->
        <div class="space-y-1.5 relative">
            <label class="text-xs font-semibold text-gray-500 block">Specialization</label>
            <div class="relative">
                <select formControlName="specialty"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 appearance-none bg-white focus:outline-none focus:ring-1 focus:ring-[#159EEC] focus:border-[#159EEC] transition-all cursor-pointer"
                    [ngClass]="{'border-red-300 focus:ring-red-400 focus:border-red-400': doctorForm.get('specialty')?.invalid && doctorForm.get('specialty')?.touched}">
                    <option value="" disabled>Select Specialization</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Endocrinology">Endocrinology</option>
                    <option value="Gastroenterology">Gastroenterology</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Ophthalmology">Ophthalmology</option>
                    <option value="Orthopedics">Orthopedics</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Psychiatry">Psychiatry</option>
                    <option value="Urology">Urology</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                    <lucide-icon [img]="ChevronDown" class="w-4 h-4"></lucide-icon>
                </div>
            </div>
            <span *ngIf="doctorForm.get('specialty')?.invalid && doctorForm.get('specialty')?.touched"
                class="text-[10px] text-red-500 font-medium tracking-wide">Specialization is required.</span>
        </div>

        <!-- Phone Number Field -->
        <div class="space-y-1.5">
            <label class="text-xs font-semibold text-gray-500 block">Phone Number</label>
            <input type="text" formControlName="phone" placeholder="+62 888 1234 5678"
                class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-[#159EEC] focus:border-[#159EEC] transition-all"
                [ngClass]="{'border-red-300 focus:ring-red-400 focus:border-red-400': doctorForm.get('phone')?.invalid && doctorForm.get('phone')?.touched}">
            <span *ngIf="doctorForm.get('phone')?.invalid && doctorForm.get('phone')?.touched"
                class="text-[10px] text-red-500 font-medium">Valid phone number is required.</span>
        </div>

        <!-- Availability Status Field -->
        <div class="space-y-1.5 relative">
            <label class="text-xs font-semibold text-gray-500 block">Availability Status</label>
            <div class="relative">
                <select formControlName="availability"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 appearance-none bg-white focus:outline-none focus:ring-1 focus:ring-[#159EEC] focus:border-[#159EEC] transition-all cursor-pointer"
                    [ngClass]="{'border-red-300 focus:ring-red-400 focus:border-red-400': doctorForm.get('availability')?.invalid && doctorForm.get('availability')?.touched}">
                    <option value="Available">Available</option>
                    <option value="On Leave">On Leave</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                    <lucide-icon [img]="ChevronDown" class="w-4 h-4"></lucide-icon>
                </div>
            </div>
            <span *ngIf="doctorForm.get('availability')?.invalid && doctorForm.get('availability')?.touched"
                class="text-[10px] text-red-500 font-medium tracking-wide">Status is required.</span>
        </div>

    </form>

    <!-- Footer Actions -->
    <ng-container modal-footer>
        <button (click)="onCancel()"
            class="px-5 py-2.5 text-sm font-semibold text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-100 transition-colors">
            Cancel
        </button>
        <button (click)="onSave()"
            class="px-6 py-2.5 text-sm font-semibold text-white bg-[#159EEC] rounded-lg hover:bg-[#1282C4] shadow-[0_2px_10px_rgba(21,158,236,0.3)] focus:outline-none focus:ring-2 focus:ring-[#159EEC]/50 transition-colors">
            Add Doctor
        </button>
    </ng-container>

</app-modal>
