<div class="flex flex-col gap-1 w-full bg-white">
  @for (tab of tabs; track tab) {
    <button
      (click)="setTab(tab)"
      [class.bg-blue-50]="activeTab() === tab"
      [class.text-blue-600]="activeTab() === tab"
      [class.font-medium]="activeTab() === tab"
      [class.text-gray-500]="activeTab() !== tab"
      [class.hover:bg-gray-50]="activeTab() !== tab"
      class="w-full text-left px-4 py-2.5 rounded-lg text-sm transition-colors cursor-pointer"
    >
      {{ tab }}
    </button>
  }
</div>
