<div class="h-full flex flex-col max-w-[1200px] mx-auto w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Settings</h2>
            <p class="text-sm text-gray-500">Customize until match to your workflows.</p>
        </div>
        <div class="flex items-center gap-3">
            <button type="button" (click)="cancelSettings()"
                class="px-4 py-2 bg-white border border-gray-200 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer">
                Cancel
            </button>
            <button type="button" (click)="saveSettings()"
                class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm cursor-pointer">
                Save
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div
        class="bg-white rounded-xl border border-gray-200 shadow-sm flex-1 flex flex-col md:flex-row overflow-hidden min-h-[600px]">
        <!-- Sidebar Navigation -->
        <div class="w-full md:w-64 shrink-0 border-b md:border-b-0 md:border-r border-gray-200 p-4 bg-gray-50/30">
            <app-settings-sidebar [activeTab]="activeTab" (tabChange)="onTabChange($event)"></app-settings-sidebar>
        </div>

        <!-- Settings Context Form -->
        <div class="flex-1 p-6 md:p-8 bg-white">
            @if (activeTab === 'Account') {
                <app-account-settings></app-account-settings>
            } @else {
                <div class="h-full flex items-center justify-center text-gray-400">
                    <p>Content for {{ activeTab }} tab goes here.</p>
                </div>
            }
        </div>
    </div>
</div>
