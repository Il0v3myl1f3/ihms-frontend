<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-dashboard-title text-[#1F2B6C] tracking-tight mb-1">Appointments</h2>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-[20px] border border-gray-100 flex-1 flex flex-col relative">
        <app-appointment-table 
            class="flex-1 flex flex-col h-full" 
            [appointments]="appointments()"
            (editAppointment)="onEditAppointment($event)" 
            (viewAppointment)="onViewAppointment($event)"
            (deleteAppointment)="onDeleteAppointment($event)"
            (deleteSelected)="onDeleteSelectedAppointments($event)"
            (createMedicalRecord)="onCreateMedicalRecord($event)"
            (addAppointment)="openCreateModal()">
        </app-appointment-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isModalOpen()) {
<app-appointment-create-modal [isOpen]="isModalOpen()" 
    [appointmentToEdit]="selectedAppointmentForEdit()"
    [readOnly]="isAppointmentReadOnly()"
    [doctors]="doctors()" [patients]="patients()" (closeModal)="closeModal()"
    (saveAppointment)="onAppointmentSaved($event)">
</app-appointment-create-modal>
}

@if (isRecordModalOpen()) {
<app-medical-record-create-modal
    [isOpen]="isRecordModalOpen()"
    [appointment]="selectedAppointmentForRecord()"
    (closeModal)="closeRecordModal()"
    (saveRecord)="onMedicalRecordSaved($event)">
</app-medical-record-create-modal>
}
