<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-dashboard-title text-[#1F2B6C] tracking-tight mb-1">List Appointments</h2>
            <p class="text-sm text-gray-500">There is the latest update for the last 7 days, check now.</p>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-[20px] border border-gray-100 flex-1 flex flex-col relative">
        <app-appointment-table class="flex-1 flex flex-col h-full" [appointments]="appointments"
            (editAppointment)="onEditAppointment($event)" (deleteAppointment)="onDeleteAppointment($event)"
            (deleteSelected)="onDeleteSelectedAppointments($event)"
            (addAppointment)="openCreateModal()"></app-appointment-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isModalOpen) {
<app-appointment-create-modal [isOpen]="isModalOpen" [appointmentToEdit]="selectedAppointmentForEdit"
    [doctors]="doctors" [patientNames]="patientNames" (closeModal)="closeModal()"
    (saveAppointment)="onAppointmentSaved($event)">
</app-appointment-create-modal>
}
