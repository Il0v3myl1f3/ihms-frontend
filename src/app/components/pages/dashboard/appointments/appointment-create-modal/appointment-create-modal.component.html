<app-modal [isOpen]="isOpen()" 
    title="{{ readOnly() ? 'View Appointment' : (appointmentToEdit() ? 'Edit Appointment' : 'Create New Appointment') }}"
    (close)="onCancel()">

    <form [formGroup]="appointmentForm" modal-body>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">

            <!-- Patient Name -->
            @if (!isPatient()) {
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Patient Name *</label>
                    <app-custom-select formControlName="patientId" placeholder="Select Patient"
                        [options]="patientOptions()">
                    </app-custom-select>
                </div>
            }

            <!-- Doctor Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Doctor Name *</label>
                <app-custom-select formControlName="doctorId" placeholder="Select Doctor"
                    [options]="doctorOptions()">
                </app-custom-select>
            </div>

            <!-- Appointment Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Appointment Date {{ appointmentToEdit() ?
                    '' : '*' }}</label>
                <app-custom-datepicker formControlName="date"></app-custom-datepicker>
                    @if (readOnly() && appointmentToEdit()) {
                        <p class="text-[12px] text-gray-500 mt-1 pl-1 font-medium italic">Current: {{ appointmentToEdit()!.appointmentDate }}</p>
                    }
            </div>

            <!-- Status -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Status *</label>
                <app-custom-select formControlName="status" placeholder="Select"
                    [options]="statusOptions">
                </app-custom-select>
            </div>

            <!-- Reason -->
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Reason *</label>
                <input type="text" formControlName="reason" placeholder="Reason for appointment"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
            </div>

            <!-- Notes (full width) -->
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Notes</label>
                <textarea formControlName="notes" placeholder="Additional notes about the appointment" rows="4"
                    maxlength="200"
                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none"></textarea>
                <p class="text-xs text-gray-400 mt-1">{{ notesLength }}/200</p>
            </div>

        </div>
    </form>

    <div modal-footer class="w-full flex items-center justify-end gap-3">
        @if (readOnly()) {
            <button type="button" (click)="onCancel()"
                class="px-8 py-2.5 bg-[#1F2B6C] text-white rounded-lg text-sm font-medium hover:bg-[#151D4A] transition-colors shadow-sm">
                Close
            </button>
        } @else {
            <button type="button" (click)="onCancel()"
                class="px-5 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Cancel
            </button>
            <button type="button" (click)="onSubmit()"
                class="px-5 py-2.5 bg-[#1F2B6C] disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium hover:bg-[#151D4A] transition-colors shadow-sm">
                {{ appointmentToEdit() ? 'Save Changes' : 'Create Appointment' }}
            </button>
        }
    </div>
</app-modal>
