<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-dashboard-title text-[#1F2B6C] tracking-tight mb-1">List Rooms</h2>
            <p class="text-sm text-gray-500">There is the latest update for the last 7 days, check now.</p>
        </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-[20px] border border-gray-100 flex-1 flex flex-col relative">
        <app-room-table class="flex-1 flex flex-col h-full" [rooms]="rooms"
            (editRoom)="onEditRoom($event)" (deleteRoom)="onDeleteRoom($event)"
            (deleteSelected)="onDeleteSelectedRooms($event)"
            (addRoom)="openAddRoomModal()"></app-room-table>
    </div>
</div>

<!-- Modal Overlay -->
@if (isAddRoomModalOpen) {
<app-room-create-modal [isOpen]="isAddRoomModalOpen" [roomToEdit]="selectedRoomForEdit"
    (closeModal)="closeAddRoomModal()" (saveRoom)="onRoomSaved($event)">
</app-room-create-modal>
}
