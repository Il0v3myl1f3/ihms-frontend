<div class="h-full flex flex-col w-full">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 -mt-2">
        <div>
            <h2 class="text-[36px] font-bold text-[#1F2B6C] tracking-tight mb-1">Medical Records</h2>
        </div>
    </div>

    <!-- Table Component -->
    <app-medical-record-table
        [records]="records()"
        [isDoctor]="isDoctor()"
        (viewRecord)="onViewRecord($event)"
        (editRecord)="onEditRecord($event)"
        (deleteRecord)="onDeleteRecord($event)">
    </app-medical-record-table>
</div>

<!-- Medical Record Modal -->
@if (isModalOpen()) {
    <app-medical-record-create-modal
        [isOpen]="isModalOpen()"
        [recordToEdit]="selectedRecord()"
        [readOnly]="isReadOnly()"
        (closeModal)="isModalOpen.set(false)"
        (saveRecord)="onSaveRecord($event)">
    </app-medical-record-create-modal>
}
